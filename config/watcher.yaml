# XZatoma Watcher - Example configuration (development & production)
#
# This file provides example watcher configurations for common deployment
# scenarios. Copy the appropriate section into your `config/` directory and
# update values for your environment.
#
# Notes:
# - Secrets (e.g., Kafka SASL password) SHOULD NOT be committed to disk.
#   Use environment variables instead (see docs/reference/watcher_environment_variables.md).
# - Kafka environment variables (used by XZepr consumer code) are prefixed with `XZEPR_`
#   (for example: `XZEPR_KAFKA_BROKERS`, `XZEPR_KAFKA_SASL_PASSWORD`).
#
# Usage:
#   xzatoma watch --config config/watcher.yaml
#
# ---------------------------------------------------------------------------
# Development configuration
# ---------------------------------------------------------------------------
provider:
  type: copilot
  copilot:
    model: gpt-5.3-codex

agent:
  # Limits how many agent turns are allowed during plan execution
  max_turns: 10
  # Overall timeout for agent execution (seconds)
  timeout_seconds: 300

watcher:
  # Watcher backend type: "xzepr" (default) or "generic"
  watcher_type: xzepr

  kafka:
    # Comma-separated Kafka broker list
    brokers: "localhost:9092"
    # Topic to consume CloudEvents from
    topic: "xzepr.events"
    # Output topic for publishing results (generic watcher only; defaults to input topic)
    output_topic: "xzepr.results"
    # Consumer group id (defaults to xzatoma-watcher if omitted)
    group_id: "xzatoma-watcher"
    # Create missing topics automatically at startup (requires broker admin permissions)
    auto_create_topics: true
    # Number of partitions for auto-created topics
    num_partitions: 1
    # Replication factor for auto-created topics (set to 3 for production)
    replication_factor: 1
    # Plaintext is fine for local development
    security:
      protocol: "PLAINTEXT"

  # Generic matcher configuration (only used when watcher_type is "generic")
  generic_match:
    # Regex pattern for event action field (case-insensitive)
    action: "deploy.*"
    # Regex pattern for event name field (case-insensitive)
    name: "service-(api|web)"
    # Regex pattern for event version field (case-insensitive)
    version: "^v[0-9]+\\.[0-9]+"

  filters:
    # Event types to process (empty list => process all)
    event_types:
      - "deployment.success"
      - "deployment.failure"
      - "ci.pipeline.completed"
    # Whether to only process successful events (true/false)
    success_only: false
    # Optional platform identifier (e.g., "kubernetes")
    platform_id: "kubernetes"

  logging:
    # Log level: trace, debug, info, warn, error
    level: "info"
    # JSON formatted logs (true/false)
    json_format: true
    # Optional file path for logs (when omitted, logs go to STDOUT)
    file_path: "/var/log/xzatoma/watcher.log"
    # Include full CloudEvent payload in logs (may increase log size)
    include_payload: false

  execution:
    # Whether to allow potentially dangerous operations in plans
    allow_dangerous: false
    # Max concurrent plan executions
    max_concurrent_executions: 5
    # Per-execution timeout (seconds)
    execution_timeout_secs: 600

# ---------------------------------------------------------------------------
# Production configuration (example)
# ---------------------------------------------------------------------------
# For production you should use SASL/SSL. Passwords should come from
# environment variables (e.g., XZEPR_KAFKA_SASL_PASSWORD) and never be
# stored in this file. Increase replication_factor and partition counts
# to match your cluster topology.
---
provider:
  type: copilot

agent:
  max_turns: 25
  timeout_seconds: 600

watcher:
  # Watcher backend type: "xzepr" (default) or "generic"
  watcher_type: xzepr

  kafka:
    brokers: "kafka-1.prod:9093,kafka-2.prod:9093,kafka-3.prod:9093"
    topic: "xzepr.production.events"
    output_topic: "xzepr.production.results"
    group_id: "xzatoma-watcher-prod"
    # Disable auto-creation in production; topics should be managed externally
    auto_create_topics: false
    num_partitions: 6
    # Match your cluster replication factor
    replication_factor: 3
    security:
      protocol: "SASL_SSL"
      sasl_mechanism: "SCRAM-SHA-256"
      sasl_username: "xzatoma-consumer"
      # Provide via env var XZEPR_KAFKA_SASL_PASSWORD -- never hardcode secrets
      sasl_password: "${XZEPR_KAFKA_SASL_PASSWORD}"

  generic_match:
    action: "deploy\\.production.*"
    name: "service-.*"
    version: "^v[0-9]+\\.[0-9]+\\.[0-9]+"

  filters:
    event_types:
      - "deployment.production.success"
    success_only: true
    source_pattern: "^xzepr\\.event\\.receiver\\.production\\."

  logging:
    level: "warn"
    json_format: true
    file_path: "/var/log/xzatoma/watcher.json"
    include_payload: false

  execution:
    allow_dangerous: false
    max_concurrent_executions: 10
    execution_timeout_secs: 1800
