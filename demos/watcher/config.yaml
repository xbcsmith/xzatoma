# XZatoma Demo: Watcher
#
# Demo-local configuration for the watcher demo.
# This file is used exclusively by this demo and must not be shared with other
# demos or replaced by the repository-level config/config.yaml at runtime.
#
# Provider: Ollama (local)
# Model:    granite4:3b
# Watcher:  generic backend, localhost:9092, topic demo.plan.events
# Usage:    xzatoma --config ./config.yaml watch \
#             --watcher-type generic \
#             --topic demo.plan.events \
#             --brokers localhost:9092

provider:
  type: ollama
  ollama:
    host: http://localhost:11434
    model: granite4:3b

agent:
  max_turns: 20
  timeout_seconds: 600

  conversation:
    max_tokens: 32000
    min_retain_turns: 3
    prune_threshold: 0.8
    warning_threshold: 0.85
    auto_summary_threshold: 0.90

  tools:
    max_output_size: 262144
    max_file_read_size: 1048576

  terminal:
    default_mode: restricted_autonomous
    timeout_seconds: 30
    max_stdout_bytes: 262144
    max_stderr_bytes: 65536

watcher:
  watcher_type: generic

  kafka:
    brokers: "localhost:9092"
    topic: "demo.plan.events"
    output_topic: "demo.plan.results"
    group_id: "xzatoma-demo-watcher"
    auto_create_topics: true
    num_partitions: 1
    replication_factor: 1
    security:
      protocol: "PLAINTEXT"

  generic_match:
    action: "demo.*"

  filters:
    event_types: []
    success_only: false

  logging:
    level: "info"
    json_format: true
    file_path: "./tmp/watcher.log"
    include_payload: true

  execution:
    allow_dangerous: false
    max_concurrent_executions: 2
    execution_timeout_secs: 300

skills:
  enabled: false
