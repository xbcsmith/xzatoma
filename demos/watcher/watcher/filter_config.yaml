# XZatoma Watcher Demo - Generic Match Configuration
#
# This file documents the event matching criteria used by the watcher demo.
# These settings mirror what is configured in the demo-local config.yaml.
#
# The generic watcher matches events against these patterns before executing
# any embedded plan. Events that do not match are silently discarded.
#
# Matching rules:
#   - action: matches any event whose action field contains "demo"
#   - name and version: not restricted (any value accepted)
#   - event_type: must be exactly "plan" (enforced by the generic watcher
#     to prevent result events from re-triggering plan execution)

generic_match:
  # Regex pattern for the event action field (case-insensitive).
  # This matches "demo-write-file", "demo-run-task", or any action
  # that starts with or contains "demo".
  action: "demo.*"

  # No name or version restrictions for this demo.
  # To restrict by name, uncomment and adjust:
  # name: "demo-.*"
  # To restrict by version, uncomment and adjust:
  # version: "^v[0-9]+\\.[0-9]+"

# Filter configuration (applied before generic_match).
# An empty event_types list means all event types are accepted.
filters:
  event_types: []
  success_only: false
