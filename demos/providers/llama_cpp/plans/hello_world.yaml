# XZatoma llama.cpp Provider Demo: Hello World Plan
#
# A minimal single-step plan that verifies XZatoma can connect to a running
# llama.cpp server via the OpenAI-compatible API, parse a plan file, and
# execute a task through the agent.
#
# Usage:
#   xzatoma --config ./config.yaml --storage-path ./tmp/xzatoma.db \
#     run --plan ./plans/hello_world.yaml

name: Hello World
description: >
  A minimal plan that verifies XZatoma is working correctly with a local
  llama.cpp inference server via the OpenAI-compatible API. The agent prints
  a greeting and confirms that the llama.cpp server is responding correctly.
steps:
  - name: Print greeting
    action: >
      Print a short greeting message to the terminal. The message must include
      the text "Hello from XZatoma" and confirm that the llama.cpp inference
      server is responding correctly via the OpenAI-compatible API.
    context: echo "Hello from XZatoma"
