# XZatoma Demo: Subagents
#
# Demo-local configuration for the subagents demo.
# This file is used exclusively by this demo and must not be shared with other
# demos or replaced by the repository-level config/config.yaml at runtime.
#
# Provider: Ollama (local)
# Model:    granite4:3b
# Subagents: max_depth 2, parallel execution, persistence in ./tmp/
# Usage:    xzatoma --config ./config.yaml --storage-path ./tmp/xzatoma.db \
#             run --plan ./plans/subagents_demo.yaml

provider:
  type: ollama
  ollama:
    host: http://localhost:11434
    model: granite4:3b

agent:
  max_turns: 30
  timeout_seconds: 600

  conversation:
    max_tokens: 32000
    min_retain_turns: 3
    prune_threshold: 0.8
    warning_threshold: 0.85
    auto_summary_threshold: 0.90

  tools:
    max_output_size: 262144
    max_file_read_size: 1048576

  terminal:
    default_mode: restricted_autonomous
    timeout_seconds: 30
    max_stdout_bytes: 262144
    max_stderr_bytes: 65536

  subagent:
    max_depth: 2
    default_max_turns: 10
    output_max_size: 65536
    telemetry_enabled: true
    persistence_enabled: true
    persistence_path: ./tmp/subagent_conversations.db
    max_executions: 5
    chat_enabled: false

skills:
  enabled: false
